name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel in-progress runs for the same branch/PR to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Backend: tests + JaCoCo coverage enforcement (≥ 85 % instruction) ────
  api-test-coverage:
    name: API – Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests with coverage check
        working-directory: Finora-API
        # `verify` runs: compile → test → JaCoCo report → JaCoCo check (fails if < 85 %)
        run: mvn verify --no-transfer-progress

      - name: Upload JaCoCo HTML report
        if: always()   # upload even when coverage check fails so you can inspect the report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: Finora-API/target/site/jacoco/
          retention-days: 14

      - name: Print coverage summary to job summary
        if: always()
        run: |
          REPORT="Finora-API/target/site/jacoco/index.html"
          if [ -f "$REPORT" ]; then
            # Extract the instruction-coverage percentage from the JaCoCo HTML
            COVERAGE=$(grep -oP '(?<=Total)[^%]+%' "$REPORT" | head -1 | tr -d ' ')
            echo "## JaCoCo Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "**Instruction coverage:** ${COVERAGE:-see artifact}" >> "$GITHUB_STEP_SUMMARY"
            echo "[Full report](../artifacts/jacoco-report/index.html)" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── 2. Backend: Checkstyle (naming = error, style = warning) 
  api-lint:
    name: API – Checkstyle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run Checkstyle
        working-directory: Finora-API
        run: mvn checkstyle:check --no-transfer-progress

  # ── 3. Frontend: ESLint + TypeScript type check 
  ui-lint:
    name: UI – ESLint & TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Finora-UI/package-lock.json

      - name: Install dependencies
        working-directory: Finora-UI
        run: npm ci

      - name: ESLint
        working-directory: Finora-UI
        run: npm run lint

      - name: TypeScript type check
        working-directory: Finora-UI
        run: npx tsc --noEmit

  # ── 4. Frontend: production build ────────────────────────────────────────
  ui-build:
    name: UI – Production Build
    runs-on: ubuntu-latest
    needs: ui-lint          # only build if linting passes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Finora-UI/package-lock.json

      - name: Install dependencies
        working-directory: Finora-UI
        run: npm ci

      - name: Build
        working-directory: Finora-UI
        run: npm run build

  # ── 5. Docker: verify both images build successfully ─────────────────────
  docker-build:
    name: Docker – Build Images
    runs-on: ubuntu-latest
    needs: [api-test-coverage, ui-build]   # gate on quality checks passing

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Package API JAR (tests already ran in api-test-coverage)
        working-directory: Finora-API
        run: mvn package -DskipTests --no-transfer-progress

      - name: Build API Docker image
        run: docker build -t finora-api:ci ./Finora-API

      - name: Build UI Docker image
        run: docker build -t finora-ui:ci ./Finora-UI
