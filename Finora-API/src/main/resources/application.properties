spring.application.name=finance-tracker

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finora}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server - Railway injects PORT env var
server.port=${PORT:8080}

# Logging
logging.level.org.springframework=INFO
logging.level.com.finance_tracker=DEBUG

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# API docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

alphavantage.api.key=${ALPHAVANTAGE_API_KEY:}

# Hikari - keep pool small; Supabase free tier caps at 25 connections
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

jwt.secret=${JWT_SECRET}

# Multipart - statement import + backup
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# CORS - comma-separated allowed origins; add Railway frontend URL here
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://localhost:5173}



